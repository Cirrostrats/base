events { }

http {
    # cirrostrats.us - proxy to frontend/backend, fallback to stage if frontend unreachable
    server {
        listen 80;
        server_name cirrostrats.us;

        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;
            proxy_intercept_errors on;
            error_page 502 503 504 = @fallback;
        }

        location /api {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        }

        location @fallback {
            return 302 https://stage.cirrostrats.us$request_uri;
        }
    }

    # prod.cirrostrats.us - original production routing
    server {
        listen 80;
        server_name prod.cirrostrats.us;

        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        }
    }
}
