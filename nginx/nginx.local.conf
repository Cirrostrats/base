events { }

http {
    server {
        listen 80;  # Listen on port 80 for incoming HTTP traffic

        # Frontend (Vite dev server) — WebSocket passthrough for HMR
        location / {
            proxy_pass http://frontend:5173;
            proxy_set_header Host $host;                # Pass the original Host header so the upstream knows which domain was requested
            proxy_set_header X-Real-IP $remote_addr;   # Pass the client's real IP to the upstream
            proxy_set_header Upgrade $http_upgrade;     # Required for WebSocket upgrade handshake (Vite HMR)
            proxy_set_header Connection "upgrade";      # Tell upstream to switch protocols (HTTP → WebSocket)
            proxy_http_version 1.1;                     # HTTP/1.1 required for WebSocket and keep-alive connections
        }

        # Backend API
        location /api {
            rewrite ^/api/(.*)$ /$1 break;                          # Strip /api prefix before forwarding — backend routes don't include it
            proxy_pass http://backend:8000;                          # Forward to FastAPI backend on port 8000
            proxy_set_header Host $host;                             # Pass the original Host header
            proxy_set_header X-Real-IP $remote_addr;                # Pass the client's real IP
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; # Pass Cloudflare's original client IP header when behind CF proxy
        }
    }
}
