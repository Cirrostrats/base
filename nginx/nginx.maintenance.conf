events { }

http {
    # Maintenance mode: redirect cirrostrats.us to stage while rebuilding
    server {
        listen 80;
        server_name cirrostrats.us;

        return 302 https://stage.cirrostrats.us$request_uri;
    }

    # prod.cirrostrats.us stays live during maintenance
    server {
        listen 80;
        server_name prod.cirrostrats.us;

        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        }
    }
}
