services:
  frontend:   #this specifiec the section of web to access (frontend or backend)
    build:  #this sections tells the docker on how to build the image (basically instructions to build the image)
      context: ./cirrostrats-frontend    #directory of the frontend 
      dockerfile: Dockerfile.frontend    #name of the frontend docker file
     
      args:
      - NODE_ENV=development #this tells the docker builder to build the image for developmement and not the production 
    ports:    
      
      - "5173:5173" #this is the port for frontend part of web, there are 2 port mentioned here 1st one is the port for actual web and 2nd port is the port inside the container
    volumes:  
      - ./cirrostrats-frontend:/app   # this line copies the entire frontend directory into the app folder inside the container
      - node_modules:/app/node_modules # this line tells the computer while we are copying the entire frontend repo, do not override/copy the node_modules from the actual laptop to the container

    networks:     
      - base-network # i dont know what this line does, i tried LLM to explain it however i still dont get it 

    environment:
      - CHOKIDAR_USEPOLLING=true   # i dont know what this line does, i tried LLM to explain it however i still dont get it 
      - WATCHPACK_POLLING=true   # i dont know what this line does, i tried LLM to explain it however i still dont get it 
  backend:
    build:
    
      context: ./cirrostrats-backend
      dockerfile: Dockerfile.backend
    ports:
      
      - "8000:8000"
    volumes:
      - ./cirrostrats-backend:/app
    networks:
      - base-network
      
    labels:
      - "traefik.enable=true"
      - "prometheus.scrape=true"
      - "prometheus.port=8080"  
      - "prometheus.path=/metrics"

  nginx:
    image: nginx
    ports:
      # Format is "HOST_PORT:CONTAINER_PORT"
      - "80:80"
    volumes:    # If working on nginx and want changes to be reflected in the container, use the volumes
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    # TODO: Check what the difference is between the above^^ and this - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - base-network
      # - observability
  
  redis:
    # deploy:   # This was used previously to prevent it from spawning in development. Accompany with .env file and set Run_Celery=1 if using this feature in production.
      # replicas: ${RUN_CELERY:-0}  # Defaults to 0 containers: no Celery in development
    image: redis
    ports:
      # Format is "HOST_PORT:CONTAINER_PORT"
      - "6379:6379"     # TODO: What is the significance of this port?
    networks:
      - base-network
    profiles:     # use docker compose --profile production up in the production environment
      - production

  celery:
    # deploy:   # This was used previously to prevent it from spawning in development. Accompany with .env file and set Run_Celery=1 if using this feature in production.
      # replicas: ${RUN_CELERY:-0}  # Defaults to 0 containers: no Celery in development
    container_name: celery_worker
    build:
      context: ./cirrostrats-backend      # This is where the celery_app.py file is
      dockerfile: routes/Dockerfile.celery   # use this if you want to build the docker image from the Dockerfile.celery and isolate the command from the rest of the Dockerfile
    command: celery -A routes.celery_app worker --loglevel=info      # Execute the tasks defined in celery_app.py This takes preecedence over the dockerfile command
    depends_on:
      - redis
    volumes:      # Changes are not reflected instantly in celery. Restart container to see changes.
      - ./cirrostrats-backend:/app
    networks:
      - base-network
    profiles:     # use docker compose --profile production up in the production environment
      - production

  celery-beat:
    # deploy:   # This was used previously to prevent it from spawning in development. Accompany with .env file and set Run_Celery=1 if using this feature in production.
      # replicas: ${RUN_CELERY:-0}  # Defaults to 0 containers: no Celery in development
    container_name: celery_beat
    build:
      context: ./cirrostrats-backend      # This is where the celery_app.py file is
      dockerfile: routes/Dockerfile.celery
    command: celery -A routes.celery_app beat --loglevel=info      # This takes preecedence over the dockerfile command
    depends_on:
      - redis
      - celery
    volumes:      # Changes are not reflected instantly in celery. Restart container to see changes.
      - ./cirrostrats-backend:/app
    networks:
      - base-network
    profiles:     # use docker compose --profile production up in the production environment
      - production


networks:
  # observability:
  #   external: true
  base-network:
    driver: bridge

volumes:
  node_modules:

